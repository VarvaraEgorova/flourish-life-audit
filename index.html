- Giving her energy: "${answers.energising}"
- Draining her: "${answers.draining}"
- Morning feeling: "${answers.morning.join(", ")}${answers.morningOther?": "+answers.morningOther:""}"

- Sleep: "${answers.sleep.join(", ")}${answers.sleepOther?": "+answers.sleepOther:""}"

${timeSummary}

- High time + draining slider = burnout trap (investing a lot in something that depletes her)
- Low time + energising slider = deprivation (something that feeds her but she's not accessing it)

- Tolerating: "${answers.tolerating}"

    const x2 = cx+r*Math.cos(angle), y2 = cy+r*Math.sin(angle);
    return React.createElement("path", { key: i, d: `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${slice>Math.PI?1:0},1 ${x2},${y2} Z`, fill: DOMAIN_COLORS[i], opacity: 0.85, stroke: C.parchment, strokeWidth: 1.5 });

  return React.createElement("svg", { width: size, height: size, viewBox: `0 0 ${size} ${size}`, style: { display: "block", margin: "0 auto" } },
    React.createElement("circle", { cx, cy, r: r+2, fill: "none", stroke: C.stone, strokeWidth: 1 }),
    ...slices,
    React.createElement("circle", { cx, cy, r: 24, fill: C.parchment })
  );
}
